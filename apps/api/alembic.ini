# Alembic configuration. Run all alembic commands from apps/api/.
# The database URL is NOT set here — env.py reads it from axon.config so
# there is exactly one source of truth for connection strings.

[alembic]
script_location = axon/db/migrations
# Make `import axon` work when alembic runs from this directory.
prepend_sys_path = .
# Timestamped, sortable revision filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
