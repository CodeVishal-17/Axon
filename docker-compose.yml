services:
  db:
    # pgvector/pgvector ships Postgres with the vector extension pre-installed,
    # so `CREATE EXTENSION vector` works without building a custom image.
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: axon
      POSTGRES_PASSWORD: axon
      POSTGRES_DB: axon
    ports:
      # Host port 5434: this machine runs a native Postgres on 5432 (and
      # another project on 5433). In-network consumers still use db:5432.
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U axon -d axon"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: apps/api
    env_file:
      - apps/api/.env
    environment:
      # Inside the compose network the DB host is the service name, not localhost.
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://axon:axon@db:5432/axon}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: http://13.127.65.8,http://13.127.65.8:3000,http://localhost:3000
      RUN_MIGRATIONS: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    # Bind-mount source for hot reload during the hackathon; the Dockerfile's
    # baked-in copy is what production deploys (Railway/Render) will use.
    command: uvicorn axon.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    # Same image as the api — one codebase, two processes.
    build:
      context: apps/api
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://axon:axon@db:5432/axon}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    command: python -m axon.jobs.worker

  web:
    container_name: axon-web-new
    build:
      context: apps/web
      args:
        NEXT_PUBLIC_API_URL: http://13.127.65.8:8000
    environment:
      NEXT_PUBLIC_API_URL: http://13.127.65.8:8000
    ports:
      - "3000:3000"
    command: npm start
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) process.exit(1)})"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
